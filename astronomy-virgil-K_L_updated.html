er * shey", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Hans Lippershey", "syll": "Hans Lip * per * shey", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Henrietta Swan Leavitt", "syll": "Hen * ri * et * ta Swan Leav * itt", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Henrietta Swan Leavitt", "syll": "Hen * ri * et * ta Swan Leav * itt", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Johannes Kepler", "syll": "Jo * han * nes Kep * ler", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Johannes Kepler", "syll": "Jo * han * nes Kep * ler", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Nicolaus Copernicus", "syll": "Nic * o * laus Co * per * ni * cus", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Nicolaus Copernicus", "syll": "Nic * o * laus Co * per * ni * cus", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Ptolemy", "syll": "Ptol * e * my", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Ptolemy", "syll": "Ptol * e * my", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Tycho Brahe", "syll": "Ty * cho Bra * he", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Tycho Brahe", "syll": "Ty * cho Bra * he", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Isaac Newton", "syll": "I * saac New * ton", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Isaac Newton", "syll": "I * saac New * ton", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Maria Mitchell", "syll": "Ma * ri * a Mit * chell", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Maria Mitchell", "syll": "Ma * ri * a Mit * chell", "def": null, "isName": true}], "reading": {"title": "Historic Models of the Universe", "paras": ["A look at the night sky reveals that Earth is not <span class=\"redhl\">the</span> only body in the vast expanse of the universe. Many celestial bodies exist, including stars, planets, and satellites.", "The earliest attempt at a scientific view of these celestial bodies was given by Aristotle, who observed that the celestial bodies seem to be placed around Earth.", "He reasoned that our world was the center of the universe, with the Sun, Moon, and planets all orbiting it. He constructed a model, called the geocentric model, which would be widely accepted model for hundreds of years.", "In the third century B.C., Aristarchus of Samos suggested that the Sun was in fact further away than previously thought, and that it was huge.", "This thought was of great significance and led him to believe that Earth and the planets were the ones that revolved around the Sun. Though this model (called the heliocentric model) was actually correct, it was less favored by Greek society.", "In 140 A.D., Ptolemy built upon Aristotle's model, which had failed to account for the motion of the planets, and added other orbits as per his observations.", "This version of the geocentric model was in line with the Christian Church's view of man being at the center of the universe. European society accepted this view for hundreds of years.", "In 1543, Nicolaus Copernicus went against these accepted ideas and published an astronomical model based on Aristarchus' idea. His heliocentric model placed the Sun at the center of the known cosmos.", "This model treated Earth the same as the other observable planets, all of which orbited the Sun at <span class=\"redhl\">a</span> specified distance. Earth also rotated on its own axis, tilted at an angle.", "The model further specified that the distance to the stars was very large as compared to the distance between Earth and the Sun.", "Copernicus' model is considered one of the most significant ideas of modern <span class=\"redhl\">astronomy</span>, though it was not widely accepted until the eighteenth century.", "In the late 1500s, Tycho Brahe, a Danish nobleman and astronomer, made observations of celestial bodies and constructed a geocentric-type model called the Tychonic system.", "The Earth was again at the center of the universe, with the Moon, Sun, and stars revolving around it. It also showed the five known planets in motion around the Sun. Nilakantha Somayaji independently developed a similar model in India.", "In 1609, Johannes Kepler, an assistant to Tycho Brahe, proposed a model based on Brahe's observations. His studies found that an elliptic orbit fit <span class=\"redhl\">the</span> movement of Mars well.", "He then developed a heliocentric model in which the planets (including Earth) were in elliptical orbit around the Sun, which was at one of <span class=\"redhl\">the</span> foci. Kepler also devised the three laws of planetary motion, which are still valid today.", "Kepler's model increased the accuracy with which people could predict the movement of <span class=\"redhl\">the</span> planets, though it was not accepted immediately.", "Galileo Galilei was also a defender of the heliocentric model—he used a modified telescope (invented by Hans Lippershey) to observe <span class=\"redhl\">the</span> movements of the planets. His observations were consistent with a heliocentric system.", "Using his telescopic observations, he proved that the geocentric model was incorrect. He published these observations in his book Dialogue Concerning the Two Chief World Systems in 1623.", "The Catholic Church condemned his work, not accepting as the correct model.", "Later, Isaac Newton proposed the laws of motion, which were a generalization of Kepler's laws.", "He predicted a universal force called gravity that not only described the motion of objects on Earth, but also the motion of planets around the Sun, and he published a mathematical formulation of his theory.", "His work finally strengthened the validity of the heliocentric model. He demonstrated the motion of the celestial bodies and predicted the shape of the Earth to be an oblate spheroid.", "Maria Mitchell was the first <span class=\"redhl\">American</span> female astronomer. In 1847, she discovered a comet with the aid of a telescope. It would later be called Miss Mitchell's Comet.", "She also prepared tables of calculations for the positions of Venus for the US Nautical Almanac Office.", "Henrietta Swan Leavitt worked at the Harvard College Observatory as a human computer, part of an all-woman team of <span class=\"redhl\">professionals</span> who measured and cataloged data on the brightness of stars from photographic plates.", "Not only did she catalog stars, but she also deduced a relationship between the brightness of certain type of variable stars called Cepheid variables (variable stars are stars whose brightness varies with time) and the length of its period (<span class=\"redhl\">the</span> time between which <span class=\"redhl\">the</span> variable star changes brightness and returns back to maximum).", "Her discovery allowed astronomers to determine distances between Earth and far-off galaxies.", "Albert Einstein was the next great thinker whose ideas helped shape our <span class=\"redhl\">understanding</span> of the universe. His most important <span class=\"redhl\">contributions</span> were the general and special theories of relativity.", "In his special theory of relativity, he extended Newton's theory to bodies moving closer to the speed of light. The general theory of relativity is a modified theory of gravitation in which mass and energy determine the geometry of spacetime.", "In 1917, Einstein extended his theory of general relativity to propose a static model of the universe. He introduced <span class=\"redhl\">a</span> term called the cosmological constant to counter the effect of gravity.", "However, the observations of Edwin Hubble and others subsequently proved this model of the universe to be incorrect.", "Edwin Hubble made many important <span class=\"redhl\">contributions</span> to <span class=\"redhl\">astronomy</span>. Up until his observations in 1922, scientists were of the opinion that the universe consisted of only one galaxy: the Milky Way.", "Hubble's observations of Cepheids and subsequent measurement of their distances (using Henrietta Swan Leavitt's calculations) showed that many celestial objects were too far away to be part of the Milky Way and were actually galaxies themselves.", "By calculating the distances to many newly found galaxies, Hubble also discovered that the galaxies were receding away from Earth and that the speed of recession was proportional to the distance.", "This established <span class=\"redhl\">the</span> fact that the universe was expanding, which changed the entire consensus (from the time of Newton) that the universe was finite. It also backed up Georges Lemaître's theory that the universe had a beginning (later called the Big Bang)."]}, "images": [{"dataUri": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAMCAgMCAgMDAwMEAwMEBQgFBQQEBQoHBwYIDAoMDAsKCwsNDhIQDQ4RDgsLEBYQERMUFRUVDA8XGBYUGBIUFRT/2wBDAQMEBAUEBQkFBQkUDQsNFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBT/wAARCAIsAUwDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwBj/tr/ABpSTa3jRV2rlv8AiV2f/wAZqvcfts/G9U8xPGh2f9gyx/8AjNeD3F/NZ+V58e5m/iqO/vF8n5VXbJ833vu1w88j6D2dH+U9     --panel2: rgba(255,255,255,0.09);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.70);
    --muted2: rgba(255,255,255,0.55);
    --accent: #6ee7ff;
    --accent2: #a78bfa;
    --good: #34d399;
    --warn: #fbbf24;
    --danger: #fb7185;
    --outline: rgba(0,0,0,0.35);
    --shadow: 0 14px 40px rgba(0,0,0,0.45);
    --radius: 18px;
    --base: 30px; /* requested 14-15 */
    --line: 1.55;
    --ls: 0.2px;
  }
  html, body {
    height: 100%;
    background: radial-gradient(1200px 600px at 30% -10%, rgba(110,231,255,0.18), transparent 55%),
                radial-gradient(900px 600px at 90% 10%, rgba(167,139,250,0.15), transparent 60%),
                linear-gradient(180deg, #070a15, #0b1020 55%, #070a15);
    color: var(--text);
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size: var(--base);
    line-height: var(--line);
    letter-spacing: var(--ls);
  }
  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 14px 28px;
    box-sizing: border-box;
    gap: 12px;
  }
  .topbar {
    width: min(980px, 100%);
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
  }
  .left, .right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .pill {
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    color: var(--muted);
    user-select: none;
  }
  .btn {
    appearance:none;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    transition: transform .06s ease, background .15s ease, border-color .15s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.20); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, rgba(110,231,255,0.18), rgba(167,139,250,0.14));
    border-color: rgba(110,231,255,0.35);
  }
  .btn.ghost {
    background: transparent;
    border-color: rgba(255,255,255,0.10);
    box-shadow: none;
  }
  .btn.small { padding: 7px 10px; border-radius: 10px; font-size: 13px; }
  .card {
    width: min(980px, 100%);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 18px 16px;
    box-sizing: border-box;
  }
  .meta {
    display:flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    color: var(--muted2);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .h1 {
    font-size: 22px;
    margin: 0 0 8px 0;
    letter-spacing: 0.2px;
  }
  .term {
    font-size: 34px;
    line-height: 1.1;
    margin: 6px 0 8px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .term.small { font-size: 28px; }
  .term.repeat {
    display:flex;
    flex-direction: column;
    gap: 6px;
  }
  .prompt {
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 14px;
  }
  .syll {
    margin-top: 10px;
    padding: 12px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .syllLine {
    font-size: 20px;
    line-height: 1.3;
    font-weight: 700;
    letter-spacing: 0.8px;
    margin: 0;
  }
  .syllLine .sep { opacity: 0.6; font-weight: 600; }
  .def {
    margin-top: 12px;
    padding: 12px 12px;
    border-radius: 14px;
    background: rgba(110,231,255,0.06);
    border: 1px solid rgba(110,231,255,0.18);
    color: rgba(255,255,255,0.86);
  }
  .def .label { font-size: 12px; color: rgba(255,255,255,0.62); text-transform: uppercase; letter-spacing: 1px; }
  .def p { margin: 6px 0 0; }
  .reading {
    font-size: var(--base);
  }
  .reading .title {
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 8px 0;
  }
  .reading p {
    margin: 0;
  }
  .hl {
    color: rgba(255,255,255,0.96);
    background: rgba(110,231,255,0.14);
    border: 1px solid rgba(110,231,255,0.20);
    padding: 0 3px;
    border-radius: 6px;
    box-shadow: 0 1px 0 var(--outline);
    -webkit-text-stroke: 0.15px rgba(0,0,0,0.25);
  }
  
  .redhl {
    color: #ff4d4d;
    font-weight: 800;
    text-shadow: 0 1px 0 var(--outline);
    -webkit-text-stroke: 0.20px rgba(0,0,0,0.28);
  }
.nav {
    width: min(980px, 100%);
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .progress {
    color: var(--muted2);
    font-size: 13px;
  }

  /* Reference panel */
  .refBtn {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 50;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 60;
  }
  .overlay.open { display:flex; }
  .refPanel {
    width: min(980px, 100%);
    max-height: min(86vh, 900px);
    overflow: auto;
    background: rgba(11,16,32,0.92);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    padding: 14px;
  }
  .refHeader {
    display:flex;
    justify-content: space-between;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .refHeader h3 {
    margin: 0;
    font-size: 16px;
    color: rgba(255,255,255,0.85);
  }
  .imgGrid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  figure {
    margin: 0;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
  }
  figure img {
    width: 100%;
    height: auto;
    display:block;
    border-radius: 10px;
  }
  figcaption {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  /* Dyslexia toggles */
  body.spacious {
    --line: 1.8;
    --ls: 0.6px;
  }
  body.bigger {
    --base: 34px;
  }

  /* "Bang" end */
  .bang {
    text-align:center;
    padding: 22px 18px;
  }
  .bang .boom {
    font-size: 44px;
    line-height: 1;
    margin: 0 0 10px;
    filter: drop-shadow(0 10px 24px rgba(0,0,0,0.45));
  }
  .bang .done {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 6px;
  }
  .spark {
    display:inline-block;

y", "syll": "Hans Lip * per * shey", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Hans Lippershey", "syll": "Hans Lip * per * shey", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Henrietta Swan Leavitt", "syll": "Hen * ri * et * ta Swan Leav * itt", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Henrietta Swan Leavitt", "syll": "Hen * ri * et * ta Swan Leav * itt", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Johannes Kepler", "syll": "Jo * han * nes Kep * ler", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Johannes Kepler", "syll": "Jo * han * nes Kep * ler", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Nicolaus Copernicus", "syll": "Nic * o * laus Co * per * ni * cus", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Nicolaus Copernicus", "syll": "Nic * o * laus Co * per * ni * cus", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Ptolemy", "syll": "Ptol * e * my", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Ptolemy", "syll": "Ptol * e * my", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Tycho Brahe", "syll": "Ty * cho Bra * he", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Tycho Brahe", "syll": "Ty * cho Bra * he", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Isaac Newton", "syll": "I * saac New * ton", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Isaac Newton", "syll": "I * saac New * ton", "def": null, "isName": true}, {"kind": "name", "layout": "basic", "term": "Maria Mitchell", "syll": "Ma * ri * a Mit * chell", "def": null, "isName": true}, {"kind": "name", "layout": "syll", "term": "Maria Mitchell", "syll": "Ma * ri * a Mit * chell", "def": null, "isName": true}], "reading": {"title": "Historic Models of the Universe", "paras": ["A look at the night sky reveals that Earth is not the only body in the vast expanse of the universe. Many celestial bodies exist, including stars, planets, and satellites. The earliest attempt at a scientific view of these celestial bodies was given by Aristotle, who observed that the celestial bodies seem to be placed around Earth. He reasoned that our world was the center of the universe, with the Sun, Moon, and planets all orbiting it. He constructed a model, called the geocentric model, which would be widely accepted model for hundreds of years.", "In the third century B.C., Aristarchus of Samos suggested that the Sun was in fact further away than previously thought, and that it was huge. This thought was of great significance and led him to believe that Earth and the planets were the ones that revolved around the Sun. Though this model (called the heliocentric model) was actually correct, it was less favored by Greek society. In 140 A.D., Ptolemy built upon Aristotle's model, which had failed to account for the motion of the planets, and added other orbits as per his observations. This version of the geocentric model was in line with the Christian Church's view of man being at the center of the universe. European society accepted this view for hundreds of years.", "In 1543, Nicolaus Copernicus went against these accepted ideas and published an astronomical model based on Aristarchus' idea. His heliocentric model placed the Sun at the center of the known cosmos. This model treated Earth the same as the other observable planets, all of which orbited the Sun at a specified distance. Earth also rotated on its own axis, tilted at an angle. The model further specified that the distance to the stars was very large as compared to the distance between Earth and the Sun. Copernicus' model is considered one of the most significant ideas of modern astronomy, though it was not widely accepted until the eighteenth century.", "In the late 1500s, Tycho Brahe, a Danish nobleman and astronomer, made observations of celestial bodies and constructed a geocentric-type model called the Tychonic system. The Earth was again at the center of the universe, with the Moon, Sun, and stars revolving around it. It also showed the five known planets in motion around the Sun. Nilakantha Somayaji independently developed a similar model in India.", "In 1609, Johannes Kepler, an assistant to Tycho Brahe, proposed a model based on Brahe's observations. His studies found that an elliptic orbit fit the movement of Mars well. He then developed a heliocentric model in which the planets (including Earth) were in elliptical orbit around the Sun, which was at one of the foci. Kepler also devised the three laws of planetary motion, which are still valid today. Kepler's model increased the accuracy with which people could predict the movement of the planets, though it was not accepted immediately.", "Galileo Galilei was also a defender of the heliocentric model\u2014he used a modified telescope (invented by Hans Lippershey) to observe the movements of the planets. His observations were consistent with a heliocentric system. Using his telescopic observations, he proved that the geocentric model was incorrect. He published these observations in his book Dialogue Concerning the Two Chief World Systems in 1623. The Catholic Church condemned his work, not accepting as the correct model.", "Later, Isaac Newton proposed the laws of motion, which were a generalization of Kepler's laws. He predicted a universal force called gravity that not only described the motion of objects on Earth, but also the motion of planets around the Sun, and he published a mathematical formulation of his theory. His work finally strengthened the validity of the heliocentric model. He demonstrated the motion of the celestial bodies and predicted the shape of the Earth to be an oblate spheroid.", "Maria Mitchell was the first American female astronomer. In 1847, she discovered a comet with the aid of a telescope. It would later be called Miss Mitchell's Comet. She also prepared tables of calculations for the positions of Venus for the US Nautical Almanac Office.", "Henrietta Swan Leavitt worked at the Harvard College Observatory as a human computer, part of an all-woman team of professionals who measured and cataloged data on the brightness of stars from photographic plates. Not only did she catalog stars, but she also deduced a relationship between the brightness of certain type of variable stars called Cepheid variables (variable stars are stars whose brightness varies with time) and the length of its period (the time between which the variable star changes brightness and returns back to maximum). Her discovery allowed astronomers to determine distances between Earth and far-off galaxies.", "Albert Einstein was the next great thinker whose ideas helped shape our understanding of the universe. His most important contributions were the general and special theories of relativity. In his special theory of relativity, he extended Newton's theory to bodies moving closer to the speed of light. The general theory of relativity is a modified theory of gravitation in which mass and energy determine the geometry of spacetime. In 1917, Einstein extended his theory of general relativity to propose a static model of the universe. He introduced a term called the cosmological constant to counter the effect of gravity. However, the observations of Edwin Hubble and others subsequently proved this model of the universe to be incorrect.", "Edwin Hubble made many important contributions to astronomy. Up until his observations in 1922, scientists were of the opinion that the universe consisted of only one galaxy: the Milky Way. Hubble's observations of Cepheids and subsequent measurement of their distances (using Henrietta Swan Leavitt's calculations) showed that many celestial objects were too far away to be part of the Milky Way and were actually galaxies themselves.", "By calculating the distances to many newly found galaxies, Hubble also discovered that the galaxies were receding away from Earth and that the speed of recession was proportional to the distance. This established the fact that the universe was expanding, which changed the entire consensus (from the time of Newton) that the universe was finite. It also backed up Georges Lema\u00eetre's theory that the universe had a beginning (later called the Big Bang)."]}, "images": [{"dataUri": "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAMCAgMCAgMDAwMEAwMEBQgFBQQEBQoHBwYIDAoMDAsKCwsNDhIQDQ4RDgsLEBYQERMUFRUVDA8XGBYUGBIUFRT/2wBDAQMEBAUEBQkFBQkUDQsNFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBT/wAARCAIsAUwDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9oADAMBAAIRAxEAPwBj/tr/ABpSTa3jRV2rlv8AiV2f/wAZqvcfts/G9U8xPGh2f9gyx/8AjNeD3F/NZ+V58e5m/iqO/vF8n5VXbJ833vu1w88j6D2dH+U9uvP25vjbCsTR+Nj8zbWX+yrH/wCM1HF+3T8b3MqN44Xf96Nv7Ksf/jNeF3Cwy6f5iN833tv92sZ5WWT+JttVGUpGFSlGP2T6Duv28PjmnzJ40+X/ALBNj/8AGaitf29Pjoy7ZfG/zj/qE2Hzf+Qa8Ma42fM+1dy/wr96sWV2ZtyNV+8c1oH0KP2/fjnFeNHP442xfd/5A9h8v/kGj/hv744yybV8eKv93/iU2H/xmvm+9vftt55jrt/vf7VC2rRN5m5WX71RzB7v8p9Df8N9/H2KTa/jsMp+7/xJ7D/4zVaL/goL8fVmXzfHn7tm/wCgPYfL/wCQa8SgWOWParNt/i/2ao37W7zeWzbf4dy1PNIJU4n0Xf8A7fvxzt2RovHu5W/h/sew/wDjNRQf8FAvju//ADPPm/8AcHsP/jNfOH8Pk/My7vlZquQTrZw7VjbzW/vUc8gjCMpH0a/7evx5LLjxyCn95dJsP/jNTwft5/HN90cvjvY7fdb+x7D5f/INfO0V0zr91VXdub5 "Geocentric", "Geocentric Model", "Heliocentric", "Heliocentric Model", "Immediately", "Nautical", "Proportional", "Relativity", "Significance", "Telescopic", "Tychonic system", "Albert Einstein", "Aristarchus of Samos", "Aristotle", "Copernicus", "Edwin Hubble", "Galileo Galilei", "Hans Lippershey", "Henrietta Swan Leavitt", "Johannes Kepler", "Nicolaus Copernicus", "Ptolemy", "Tycho Brahe", "Isaac Newton", "Maria Mitchell", "Cepheid", "elliptic"]}</script>
<script>
(() => {
  const DATA = JSON.parse(document.getElementById('DATA').textContent);

  const cardEl = document.getElementById('card');
  const sectionPill = document.getElementById('sectionPill');
  const counterPill = document.getElementById('counterPill');
  const progressText = document.getElementById('progressText');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const jumpReadingBtn = document.getElementById('jumpReading');
  const refBtn = document.getElementById('refBtn');
  const overlay = document.getElementById('overlay');
  const closeOverlay = document.getElementById('closeOverlay');
  const imgGrid = document.getElementById('imgGrid');

  const toggleSize = document.getElementById('toggleSize');
  const toggleSpacing = document.getElementById('toggleSpacing');

  let mode = 'vocab'; // vocab | reading | done
  let idx = 0;

  // Build reading card list after vocab + names
  const vocabCards = DATA.cards;
  const readingCards = DATA.reading.paras.map((p, i) => ({
    kind: 'reading',
    title: (i === 0 ? DATA.reading.title : null),
    text: p
  }));
  const all = [...vocabCards, ...readingCards, { kind: 'done' }];

  // Reference images
  function renderImages() {
    imgGrid.innerHTML = '';
    DATA.images.forEach(img => {
      const fig = document.createElement('figure');
      const im = document.createElement('img');
      im.src = img.dataUri;
      im.alt = img.alt || img.caption || 'reference image';
      const cap = document.createElement('figcaption');
      cap.textContent = img.caption || '';
      fig.appendChild(im);
      fig.appendChild(cap);
      imgGrid.appendChild(fig);
    });
  }
  renderImages();

  function escapeRegExp(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // Build term highlighter (longest first so phrases win)
  const terms = (DATA.highlightTerms || []).slice()
    .filter(Boolean)
    .sort((a,b)=> b.length - a.length);

  function highlightText(htmlText) {
    let out = htmlText;
    terms.forEach(t => {
      const pat = escapeRegExp(t);
      // Use boundaries for single words; for multi-word phrases, allow boundary at ends.
      const isSingle = !t.includes(' ');
      const re = isSingle
        ? new RegExp('\\b(' + pat + ')\\b', 'gi')
        : new RegExp('(^|[^\\w])(' + pat + ')(?![\\w])', 'gi');
      out = out.replace(re, (m, g1, g2) => {
        if (g2 === undefined) {
          return `<span class="hl">${m}</span>`;
        }
        return `${g1}<span class="hl">${g2}</span>`;
      });
    });
    return out;
  }

  const colorCycle = ['var(--accent)', 'var(--accent2)', 'var(--good)', 'var(--warn)', 'var(--danger)'];

  function coloredSyllables(syllStr) {
    // Example: "Ge * o * cen * tric" -> tokens separated by "*"
    const raw = syllStr.split('*').map(s => s.trim()).filter(Boolean);
    if (!raw.length) return '';
    return raw.map((part, i) => {
      const c = colorCycle[i % colorCycle.length];
      return `<span style="color:${c}; text-shadow: 0 1px 0 var(--outline);">${part}</span>`;
    }).join(` <span class="sep">•</span> `);
  }

  function renderCard() {
    const item = all[idx];
    const total = all.length;

    // Pills / progress
    if (item.kind === 'reading') {
      sectionPill.textContent = 'Reading';
      refBtn.style.display = 'inline-flex';
      jumpReadingBtn.textContent = 'Go to Vocab';
    } else if (item.kind === 'done') {
      sectionPill.textContent = 'Done';
      refBtn.style.display = 'none';
      jumpReadingBtn.textContent = 'Go to Vocab';
    } else {
      sectionPill.textContent = item.isName ? 'Names' : 'Vocab';
      refBtn.style.display = 'none';
      jumpReadingBtn.textContent = 'Go to Reading';
    }

    counterPill.textContent = `${idx+1} / ${total}`;
    progressText.textContent = (item.kind === 'done')
      ? ''
      : (item.kind === 'reading'
          ? `Reading card ${idx - vocabCards.length + 1} / ${readingCards.length}`
          : `Vocab card ${idx + 1} / ${vocabCards.length}`);

    prevBtn.disabled = (idx === 0);
    nextBtn.textContent = (idx === total - 1) ? 'Restart' : 'Next';

    if (item.kind === 'done') {
      cardEl.innerHTML = `
        <div class="bang">
          <div class="boom"><span class="spark">💥</span> <span class="spark">✨</span> <span class="spark">🚀</span></div>
          <div class="done">Done.</div>
          <div style="color: var(--muted);">Nice work.</div>
          <div style="margin-top: 14px;">
            <button class="btn primary" id="restartBtn">Start Over</button>
          </div>
        </div>
      `;
      const r = document.getElementById('restartBtn');
      r.addEventListener('click', () => { idx = 0; mode = 'vocab'; renderCard(); });
      return;
    }

    if (item.kind === 'reading') {
      const titleHtml = item.title ? `<div class="title">${item.title}</div>` : '';
      const bodyHtml = highlightText(item.text)
        .replace(/\n/g, '<br/>');
      cardEl.innerHTML = `
        <div class="meta">
          <div>Read slowly. Pause when you see a highlighted word.</div>
          <div>Reference images are toggleable.</div>
        </div>
        <div class="reading">
          ${titleHtml}
          <p>${bodyHtml}</p>
        </div>
      `;
      return;
    }

    // vocab / name cards
    const term = item.term || '';
    const termClass = term.length > 14 ? 'term small' : 'term';
    const syllHtml = item.syll ? coloredSyllables(item.syll) : '';
    const plainSyll = item.syll ? item.syll : '';

    let inner = '';
    if (item.layout === 'syll') {
      inner = `
        <div class="${termClass}">${term}</div>
        <div class="syll">
          <p class="syllLine">${syllHtml}</p>
          <p class="prompt" style="margin:10px 0 0; color: var(--muted2);">If it helps, tap the word and say it slowly.</p>
        </div>
      `;
    } else if (item.layout === 'def') {
      inner = `
        <div class="${termClass}">${term}</div>
        <div class="def">
          <div class="label">Meaning</div>
          <p>${item.def || ''}</p>
        </div>
      `;
    } else if (item.layout === 'repeat') {
      inner = `
        <div class="term repeat">
          <div>${term}</div>
          <div style="opacity:0.85;">${term}</div>
        </div>
        <div class="prompt">Say it once. Then once more.</div>
      `;
    } else {
      // basic/prompt
      inner = `
        <div class="${termClass}">${term}</div>
        <div class="prompt">Look at it. Say it. (If you want: write it once on paper.)</div>
      `;
    }

    cardEl.innerHTML = `
      <div class="meta">
        <div>${item.isName ? 'Name' : 'Word / Phrase'}</div>
        <div>${item.layout === 'syll' ? 'Break it into parts' : item.layout === 'def' ? 'Quick meaning' : 'Quick look'}</div>
      </div>
      ${inner}
    `;
  }

  function goNext() {
    if (idx >= all.length - 1) {
      idx = 0;
      mode = 'vocab';
    } else {
      idx += 1;
    }
    renderCard();
  }
  function goPrev() {
    if (idx > 0) idx -= 1;
    renderCard();
  }

  prevBtn.addEventListener('click', goPrev);
  nextBtn.addEventListener('click', goNext);

  // Keyboard nav
  window.addEventListener('keydown', (e) => {
    if (overlay.classList.contains('open')) {
      if (e.key === 'Escape') closeRef();
      return;
    }
    if (e.key === 'ArrowRight' || e.key === 'Enter') goNext();
    if (e.key === 'ArrowLeft') goPrev();
  });

  function openRef() {
    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
  }
  function closeRef() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
  }
  refBtn.addEventListener('click', openRef);
  closeOverlay.addEventListener('click', closeRef);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeRef();
  });

  // Jump button
  jumpReadingBtn.addEventListener('click', () => {
    const firstReading = vocabCards.length;
    if (idx < firstReading) {
      idx = firstReading; // go to first reading card
    } else {
      idx = 0; // back to vocab start
    }
    renderCard();
  });

  // Dyslexia toggles
  toggleSize.addEventListener('click', () => {
    document.body.classList.toggle('bigger');
  });
  toggleSpacing.addEventListener('click', () => {
    document.body.classList.toggle('spacious');
  });

  // Tap anywhere on card to go next (optional, but handy)
  cardEl.addEventListener('click', (e) => {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (['button','a','input','textarea'].includes(tag)) return;
    // prevent accidental next when selecting text
    const sel = window.getSelection && window.getSelection().toString();
    if (sel && sel.length > 0) return;
    goNext();
  });

  renderCard();
})();
</script>
</body>
</html>
